<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Newspaper body -->
  <rect x="3" y="4" width="26" height="24" fill="#ffffff" stroke="#000"/>
  <rect x="3" y="4" width="26" height="4" fill="#c0c0c0" stroke="#000"/>
  <!-- Masthead title bar -->
  <rect x="5" y="5" width="22" height="2" fill="#000"/>
  <!-- First paragraph -->
  <rect x="5" y="10" width="10" height="1" fill="#000"/>
  <rect x="5" y="12" width="10" height="1" fill="#666"/>
  <rect x="5" y="14" width="10" height="1" fill="#666"/>
  <rect x="5" y="16" width="10" height="1" fill="#666"/>
  <rect x="5" y="18" width="10" height="1" fill="#666"/>
  <!-- Chart snapshot on right -->
  <rect x="17" y="10" width="10" height="10" fill="#eef" stroke="#000"/>
  <rect x="19" y="15" width="2" height="4" fill="#3465a4"/>
  <rect x="22" y="12" width="2" height="7" fill="#73d216"/>
  <rect x="25" y="17" width="1" height="2" fill="#ef2929"/>
  <!-- Bottom column lines -->
  <rect x="5" y="22" width="22" height="1" fill="#666"/>
  <rect x="5" y="24" width="22" height="1" fill="#666"/>
  <rect x="5" y="26" width="14" height="1" fill="#666"/>
</svg>
