<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Monitor bezel -->
  <rect x="3" y="4" width="26" height="20" fill="#c0c0c0" stroke="#000"/>
  <rect x="5" y="6" width="22" height="16" fill="#000080"/>
  <!-- Outward arrows on the inner screen -->
  <g fill="#ffff80">
    <!-- top-left -->
    <rect x="7" y="8"  width="6" height="1"/>
    <rect x="7" y="8"  width="1" height="6"/>
    <rect x="8" y="9"  width="2" height="1"/>
    <rect x="8" y="9"  width="1" height="2"/>
    <!-- top-right -->
    <rect x="19" y="8" width="6" height="1"/>
    <rect x="24" y="8" width="1" height="6"/>
    <rect x="22" y="9" width="2" height="1"/>
    <rect x="23" y="9" width="1" height="2"/>
    <!-- bottom-left -->
    <rect x="7" y="19" width="6" height="1"/>
    <rect x="7" y="14" width="1" height="6"/>
    <rect x="8" y="18" width="2" height="1"/>
    <rect x="8" y="17" width="1" height="2"/>
    <!-- bottom-right -->
    <rect x="19" y="19" width="6" height="1"/>
    <rect x="24" y="14" width="1" height="6"/>
    <rect x="22" y="18" width="2" height="1"/>
    <rect x="23" y="17" width="1" height="2"/>
  </g>
  <!-- Stand -->
  <rect x="13" y="24" width="6" height="2" fill="#808080"/>
  <rect x="9" y="26" width="14" height="2" fill="#a0a0a0" stroke="#000"/>
</svg>
