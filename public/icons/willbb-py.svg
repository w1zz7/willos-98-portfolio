<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Bezel -->
  <rect x="2" y="3" width="28" height="22" fill="#1a1a1a" stroke="#000"/>
  <!-- Screen -->
  <rect x="4" y="5" width="24" height="18" fill="#0a0f14"/>
  <!-- Phosphor up-line -->
  <polyline points="5,19 8,17 11,18 14,13 17,15 20,10 23,11 27,7" fill="none" stroke="#5dd39e" stroke-width="1"/>
  <!-- Python-themed ticker dots (yellow + blue) -->
  <rect x="5" y="6" width="2" height="1" fill="#FFE873"/>
  <rect x="9" y="6" width="2" height="1" fill="#4584b6"/>
  <rect x="13" y="6" width="2" height="1" fill="#FFE873"/>
  <rect x="17" y="6" width="2" height="1" fill="#4584b6"/>
  <!-- "PY" label glyph at the bottom-right of the screen -->
  <rect x="20" y="19" width="2" height="3" fill="#FFE873"/>
  <rect x="22" y="19" width="2" height="1" fill="#FFE873"/>
  <rect x="22" y="20" width="2" height="1" fill="#FFE873"/>
  <rect x="24" y="19" width="2" height="3" fill="#4584b6"/>
  <rect x="26" y="19" width="1" height="1" fill="#4584b6"/>
  <rect x="25" y="20" width="2" height="1" fill="#4584b6"/>
  <!-- Stand -->
  <rect x="13" y="25" width="6" height="2" fill="#808080"/>
  <rect x="9" y="27" width="14" height="2" fill="#a0a0a0" stroke="#000"/>
</svg>
